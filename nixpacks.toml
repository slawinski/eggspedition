# nixpacks.toml

[phases.setup]
nixPkgs = ['bun']

[phases.install]
cmds = ['bun install --frozen-lockfile']

[phases.build]
# We use SKIP_BUN_VERSION_CHECK=1 to prevent varlock from crashing if the
# environment's Bun version is slightly below 1.3.3.
cmds = ['SKIP_BUN_VERSION_CHECK=1 bun run build']

[start]
cmd = 'bun run start'

[variables]
NIXPACKS_NODE_VERSION = '22'
PORT = '3000'
SKIP_BUN_VERSION_CHECK = '1'
