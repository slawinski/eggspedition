# nixpacks.toml

[phases.setup]
nixPkgs = ['bun']
# Pinning to a specific nixpkgs archive ensures we get Bun 1.3.3+ 
# even if the Coolify host's default is older.
nixpkgsArchive = '8c29968b3a942f2903f90797f9623737c215737c'

[phases.install]
cmds = ['bun install --frozen-lockfile']

[phases.build]
cmds = ['bun run build']

[start]
cmd = 'bun run start'

[variables]
NIXPACKS_NODE_VERSION = '22'
PORT = '3000'
