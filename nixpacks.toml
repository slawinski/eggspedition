# nixpacks.toml

[phases.setup]
# We install the base bun from Nix, but then upgrade it immediately 
# to ensure we have 1.3.3+ for Varlock.
nixPkgs = ['bun', 'curl', 'unzip']

[phases.install]
cmds = [
  'curl -fsSL https://bun.sh/install | bash',
  'export PATH="$HOME/.bun/bin:$PATH" && bun install --frozen-lockfile'
]

[phases.build]
# Ensure we use the upgraded Bun path
cmds = ['export PATH="$HOME/.bun/bin:$PATH" && bun run build']

[start]
# Ensure we use the upgraded Bun path
cmd = 'export PATH="$HOME/.bun/bin:$PATH" && bun run start'

[variables]
NIXPACKS_NODE_VERSION = '22'
PORT = '3000'
